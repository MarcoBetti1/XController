name: ci

on:
  push:
    branches:
      - main
      - labui-testing
  pull_request:
    branches:
      - main
      - labui-testing

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install build
        run: python -m pip install --upgrade pip build

      - name: Install project
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          extras = project.get("project", {}).get("optional-dependencies", {})
          enabled = [name for name in ("lab", "dev") if name in extras]
          target = f'.[{",".join(enabled)}]' if enabled else "."
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", target])
          PY

      - name: Smoke test public imports
        run: |
          python - <<'PY'
          import XController as XController_pkg
          from XController import ControllerSettings, ObservedPostData, XController as XControllerClass

          assert XController_pkg.__version__
          assert ControllerSettings
          assert ObservedPostData
          assert XControllerClass
          PY

      - name: Build package artifacts
        run: python -m build

      - name: Run unittest suite when present
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          tests_dir = Path("tests")
          has_tests = tests_dir.is_dir() and any(tests_dir.glob("test_*.py"))
          if has_tests:
              subprocess.check_call([sys.executable, "-m", "unittest", "discover", "-s", "tests", "-p", "test_*.py"])
          else:
              print("No tests on this branch.")
          PY
