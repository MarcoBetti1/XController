name: ci

on:
  push:
    branches:
      - main
      - labui-testing
  pull_request:
    branches:
      - main
      - labui-testing

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install build
        run: python -m pip install --upgrade pip build

      - name: Install project
        shell: bash
        run: |
          if grep -q '^lab = \[' pyproject.toml && grep -q '^dev = \[' pyproject.toml; then
            python -m pip install -e ".[lab,dev]"
          elif grep -q '^dev = \[' pyproject.toml; then
            python -m pip install -e ".[dev]"
          else
            python -m pip install -e .
          fi

      - name: Smoke test public imports
        run: |
          python - <<'PY'
          import XController as XController_pkg
          from XController import ControllerSettings, ObservedPostData, XController as XControllerClass

          assert XController_pkg.__version__
          assert ControllerSettings
          assert ObservedPostData
          assert XControllerClass
          PY

      - name: Build package artifacts
        run: python -m build

      - name: Run unittest suite when present
        shell: bash
        run: |
          if compgen -G "tests/*.py" > /dev/null; then
            python -m unittest discover -s tests -p "test_*.py"
          else
            echo "No tests on this branch."
          fi
